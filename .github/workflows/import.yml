name: import-from-fishtaxi
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/import.yml'

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ImageMagick
        run: sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick fonts-dejavu-core

      - name: Clone source
        run: git clone --depth 1 https://github.com/emillion-lab/FISHTAXI /tmp/src

      - name: Copy and rebrand
        run: |
          cp /tmp/src/index.html /tmp/src/manifest.json /tmp/src/sw.js .
          touch .nojekyll
          sed -i 's|https://fish.taxi/|https://emillion-lab.github.io/TAXITI/|g' index.html
          sed -i 's|fish\.taxi|TAXITI|g' index.html manifest.json
          sed -i 's|fishtaxi-lang|taxiti-lang|g; s|fishtaxi_theme|taxiti_theme|g' index.html
          sed -i 's|276 / 300|50 / 50|g; s|276/300|50/50|g' index.html
          sed -i 's|300 drivers|50 drivers per city|g' index.html
          sed -i 's|300 шофьора|50 шофьора на град|g' index.html
          sed -i 's|300 Fahrer|50 Fahrer pro Stadt|g' index.html
          sed -i 's|les 300 premiers chauffeurs dans le monde|les 50 premiers chauffeurs par ville|g; s|les 300 premiers chauffeurs|les 50 premiers chauffeurs par ville|g' index.html
          sed -i 's|первых 300 водителей|первых 50 водителей в каждом городе|g; s|первые 300 водителей|первые 50 водителей в каждом городе|g' index.html
          sed -i 's|i primi 300 autisti nel mondo|i primi 50 autisti per città|g; s|i primi 300 autisti|i primi 50 autisti per città|g' index.html
          sed -i 's|los primeros 300 conductores en el mundo|los primeros 50 conductores por ciudad|g; s|los primeros 300 conductores|los primeros 50 conductores por ciudad|g' index.html
          # Демо флот: инжектиране на скрипта
          sed -i 's|</body>|<script src="demo-fleet.js"></script></body>|' index.html

      - name: Generate demo fleet from newest TAXI registry data
        run: |
          FILE=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/emillion-lab/TAXI/contents/" \
            | python3 -c "
          import json,sys,re
          fs=[f['name'] for f in json.load(sys.stdin) if re.match(r'taxi_data_Sofia\d',f['name'])]
          def k(n):
              m=re.search(r'(\d{1,2})\.(\d{1,2})\.(\d{2,4})',n); d,mo,y=int(m.group(1)),int(m.group(2)),int(m.group(3))
              return (y+2000 if y<100 else y,mo,d)
          print(max(fs,key=k))")
          echo "Using registry: $FILE"
          curl -s -o /tmp/reg.json "https://raw.githubusercontent.com/emillion-lab/TAXI/main/$FILE"
          python3 - <<'EOF'
          import json, hashlib, random
          reg = json.load(open('/tmp/reg.json'))
          lst = reg if isinstance(reg, list) else reg.get('data')
          AV_M = ['🧔','👨','👨‍🦱','👨‍🦳','🧑','👨‍🦲','😎','🧢','👴','🕺']
          AV_F = ['👩','👩‍🦱','👱‍♀️','👩‍🦰','🙋‍♀️','👵']
          def avatar(full, seed):
              first = full.split()[0] if full.split() else ''
              fem = first.endswith(('А', 'Я')) and first not in ('НИКОЛА', 'ИЛИЯ', 'ПЕТКА')
              pool = AV_F if fem else AV_M
              return pool[seed % len(pool)]
          out = []
          for r in lst:
              name = (r.get('operatorName') or '').upper()
              if 'ОН-СИТИТРАНС' in name: firm = 'ON'
              elif 'ОТ-СИТИТРАНС' in name: firm = 'OT'
              else: continue
              vehicles = [v for v in (r.get('vehicles') or []) if v.get('registerNumber')]
              drivers = [d for d in (r.get('drivers') or []) if d.get('driverName')]
              if not vehicles: continue
              for i, d in enumerate(drivers):
                  v = vehicles[i % len(vehicles)]
                  seed = int(hashlib.md5((d['driverName'] + v['registerNumber']).encode()).hexdigest()[:8], 16)
                  rnd = random.Random(seed)
                  out.append({
                      'n': d['driverName'].title(),
                      'm': (v.get('markAndModel') or '—').title(),
                      'p': v['registerNumber'],
                      'f': firm,
                      'lat': round(42.635 + rnd.random() * 0.115, 5),
                      'lng': round(23.245 + rnd.random() * 0.205, 5),
                      'on': 1 if rnd.random() > 0.3 else 0,
                      'av': avatar(d['driverName'].upper(), seed),
                      'r': round(4.2 + rnd.random() * 0.8, 1),
                      'y': 1 + seed % 24,
                  })
          json.dump(out, open('demo-fleet.json', 'w'), ensure_ascii=False, separators=(',', ':'))
          print('demo fleet:', len(out), 'drivers')
          EOF

      - name: Generate TAXITI icons (yellow, black text, taxi checkers)
        run: |
          mkdir -p img
          D=""
          for y in 0 448; do
            for x in $(seq 0 64 480); do D="$D rectangle $x,$y $((x+32)),$((y+32))"; done
            for x in $(seq 32 64 480); do D="$D rectangle $x,$((y+32)) $((x+32)),$((y+64))"; done
          done
          convert -size 512x512 xc:'#f5c518' -fill black -draw "$D" \
            -gravity center -pointsize 240 -font DejaVu-Sans-Bold -fill black -annotate +0+15 'T' img/icon-512.png
          convert img/icon-512.png -resize 192x192 img/icon-192.png
          convert img/icon-512.png -resize 180x180 img/icon-180.png
          cp img/icon-512.png favicon.png
          D2=""
          for y in 0 566; do
            for x in $(seq 0 64 566); do D2="$D2 rectangle $x,$y $((x+32)),$((y+32))"; done
            for x in $(seq 32 64 566); do D2="$D2 rectangle $x,$((y+32)) $((x+32)),$((y+64))"; done
          done
          convert -size 630x630 xc:'#f5c518' -fill black -draw "$D2" \
            -gravity center -pointsize 100 -font DejaVu-Sans-Bold -fill black -annotate +0+0 'TAXITI' img/og-image.jpg

      - name: Driver placeholder
        run: |
          cat > driver.html <<'EOF'
          <!doctype html>
          <html lang="bg">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>TAXITI — Driver</title>
          <style>body{background:#f5c518;color:#111;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;text-align:center;padding:20px}h1{letter-spacing:2px}</style>
          </head>
          <body><div><h1>TAXITI Driver</h1><p>Шофьорското приложение идва скоро.<br>The driver app is coming soon.</p></div></body>
          </html>
          EOF

      - name: Commit
        run: |
          git config user.name taxiti-bot
          git config user.email taxiti-bot@users.noreply.github.com
          git add -A
          git commit -m "import: TAXITI + Sititrans demo fleet (gendered avatars)"
          git push
